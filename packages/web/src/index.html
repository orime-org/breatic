<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Breatic - Make Creation as Natural as Breathing" />
    <title>Workspace - Breatic</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      // Apply persisted theme before React mounts so a cold load does
      // not flash the default theme then snap to the user's choice
      // (FOUC). Mirrors the `breatic.preferences` Zustand persist
      // key shape — update both sites if the storage shape changes.
      (function () {
        try {
          var raw = localStorage.getItem('breatic.preferences');
          var stored = raw ? (JSON.parse(raw).state || {}).theme : null;
          var effective = stored;
          if (!stored || stored === 'system') {
            effective = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.dataset.theme = effective;
        } catch (e) {
          // localStorage or JSON parse may fail (private mode, quota,
          // corrupted value); React's ThemeToggle effect will repair
          // on mount.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
