<?xml version="1.0" encoding="UTF-8"?>
<!--
  Breatic favicon — mirrors inner-design `design/logo/tight/logo-color.svg`
  (commit 6ba50ba) for browser tab icon clarity.

  Source viewBox is -50 -50 100 100 (per design spec); tight variant
  trims to -42 -42 84 84 (5% margin) so 16x16 favicon fills the visible
  icon area without rendering at ~11x11 (loose viewBox aspect).

  GEOMETRY IS COPIED EXACTLY from inner-design tight variant — only
  viewBox + dimensions differ from the canonical SVG. Brand colors +
  arc paths must match the design source.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="-42 -42 84 84">
  <g transform="scale(1, -1)">
    <circle cx="25.98" cy="-15" r="10" fill="#BC4B36"/>
    <path d="M 25.98 -15 A 30 30 0 0 0 -25.98 -15" fill="none" stroke="#BC4B36" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-30" cy="0" r="7" fill="#0EA5E9"/>
    <path d="M -30 0 A 30 30 0 0 0 -7.76 28.98" fill="none" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round"/>
    <circle cx="7.76" cy="28.98" r="7" fill="#15D45A"/>
    <path d="M 7.76 28.98 A 30 30 0 0 0 30 0" fill="none" stroke="#15D45A" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
