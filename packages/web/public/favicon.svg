<?xml version="1.0" encoding="UTF-8"?>
<!--
  Breatic favicon — tight bounding-box variant of inner-design
  `design/logo/logo-color.svg` for browser tab icon clarity.

  Source viewBox is -50 -50 100 100 (per design spec); content bbox is
  roughly -38..38 in both axes. Tab favicons are 16x16, so a loose
  viewBox makes the visible content render at ~11x11 — visually smaller
  than peers (GitHub, Twitter, etc.). This file tightens viewBox to
  -38 -38 76 76 so 16x16 fills the visible icon area.

  GEOMETRY IS COPIED EXACTLY from `inner-design/design/logo/logo-color.svg`
  — only the viewBox + dimensions change. Brand colors + arc paths
  must match the design source.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="-38 -38 76 76">
  <g transform="scale(1, -1)">
    <circle cx="25.98" cy="-15" r="10" fill="#BC4B36"/>
    <path d="M 25.98 -15 A 30 30 0 0 0 -25.98 -15" fill="none" stroke="#BC4B36" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-30" cy="0" r="7" fill="#0EA5E9"/>
    <path d="M -30 0 A 30 30 0 0 0 -7.76 28.98" fill="none" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round"/>
    <circle cx="7.76" cy="28.98" r="7" fill="#15D45A"/>
    <path d="M 7.76 28.98 A 30 30 0 0 0 30 0" fill="none" stroke="#15D45A" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
