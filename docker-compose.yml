# docker-compose.yml — deployment stack.
#
# Default: pulls pre-built images from GHCR. `BREATIC_TAG` in .env picks
# which tag to pull (defaults to `:latest` = main branch). Deployers
# never build from source — that's CI's job.
#
# Developers contributing to breatic should use `pnpm dev` instead; this
# compose file is not in the dev path. The only shared concern is the
# postgres + redis pair below, which both dev and deploy can run via
# `docker compose up -d postgres redis` (dev) or `up -d` (deploy).
#
# See docs/DEPLOY.md for the full deploy flow and BREATIC_TAG usage.

services:
  # ── Infrastructure ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: breatic
      POSTGRES_PASSWORD: breatic
      POSTGRES_DB: breatic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Create the second database (breatic_yjs) on first init. The
      # postgres image runs *.sql in this dir once, when the data volume
      # is empty. For an EXISTING volume, create it manually:
      #   docker compose exec postgres psql -U breatic -c "CREATE DATABASE breatic_yjs;"
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breatic"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Frontend + Reverse Proxy ───────────────────
  web:
    image: ghcr.io/orime-org/breatic-web:${BREATIC_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - server
      - collab
    restart: unless-stopped

  # ── Database Migration (runs once, then exits) ──
  # Must run from packages/server so Node can resolve @breatic/core's
  # transitive deps (drizzle-orm, postgres) via server's node_modules.
  migrate:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    working_dir: /app/packages/server
    command: ["node", "-e", "import('@breatic/core').then(m => m.runMigrations()).then(() => process.exit(0))"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  # ── Application ────────────────────────────────
  # Each application service exposes `GET /healthz` on a dedicated
  # health port (`main port + 1` convention) — server 3001 / collab 1235 /
  # worker 9101 — so docker's healthcheck can probe an isolated
  # endpoint that fails its own port independent of main traffic.
  # After `retries` consecutive failures docker marks the container
  # `unhealthy`; combined with `restart: unless-stopped` the
  # container is killed and respawned automatically — closing the
  # self-heal loop the 2026-05-27 collab long-running drift exposed
  # (see CLAUDE.md "server-side industrial-grade standards" mandate).
  server:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    command: ["node", "packages/server/dist/index.js"]
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      # `wget` is in the base node image; `-q -O -` keeps the
      # output silent so docker only inspects exit code. The 200/503
      # contract is enforced by the http server in
      # packages/core/src/infra/health-server.ts.
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  collab:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    command: ["node", "packages/collab/dist/index.js"]
    ports:
      - "1234:1234"
    env_file: .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:1235/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    command: ["node", "packages/worker/dist/index.js"]
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9101/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
