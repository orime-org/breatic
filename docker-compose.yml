# docker-compose.yml — deployment stack.
#
# Default: pulls pre-built images from GHCR. `BREATIC_TAG` in .env picks
# which tag to pull (defaults to `:latest` = main branch). Deployers
# never build from source — that's CI's job.
#
# Developers contributing to breatic should use `pnpm dev` instead; this
# compose file is not in the dev path. The only shared concern is the
# postgres + redis pair below, which both dev and deploy can run via
# `docker compose up -d postgres redis` (dev) or `up -d` (deploy).
#
# See docs/DEPLOY.md for the full deploy flow and BREATIC_TAG usage.

services:
  # ── Infrastructure ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: breatic
      POSTGRES_PASSWORD: breatic
      POSTGRES_DB: breatic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breatic"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Frontend + Reverse Proxy ───────────────────
  web:
    image: ghcr.io/orime-org/breatic-web:${BREATIC_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
      - collab
    restart: unless-stopped

  # ── Database Migration (runs once, then exits) ──
  # Must run from packages/server so Node can resolve @breatic/core's
  # transitive deps (drizzle-orm, postgres) via server's node_modules.
  migrate:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    working_dir: /app/packages/server
    command: ["node", "-e", "import('@breatic/core').then(m => m.runMigrations()).then(() => process.exit(0))"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  # ── Application ────────────────────────────────
  api:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    command: ["node", "packages/server/dist/index.js"]
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  collab:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    command: ["node", "packages/collab/dist/index.js"]
    ports:
      - "1234:1234"
    env_file: .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ghcr.io/orime-org/breatic:${BREATIC_TAG:-latest}
    command: ["node", "packages/worker/dist/index.js"]
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
