# Shared location blocks for HTTP and HTTPS servers.
# Included by nginx.conf — do not load independently.

root /usr/share/nginx/html;
index index.html;

# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
gzip_min_length 1024;

# API proxy
location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE support (Agent chat + Text mini-tools)
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}

# Hocuspocus WebSocket proxy
location /ws {
    proxy_pass http://collab:1234;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
}

# Uploaded files (local storage mode)
location /uploads/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    expires 1d;
}

# SPA fallback — all other routes serve index.html
location / {
    try_files $uri $uri/ /index.html;
}
