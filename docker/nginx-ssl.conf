# HTTPS server — only active when SSL certs are available at /etc/nginx/certs/.
# Selected by entrypoint.sh when cert.pem + cert.key exist.
#
# Canonical domain enforcement: apex (non-www) is 301-redirected to www.
# This keeps all users on a single origin — localStorage/token/cookies
# are not split between www and non-www.
#
# The redirect uses a generic regex (not hardcoded to thinkai.cc/breatic.ai),
# so the same Docker image works for any deployment domain. SSL cert
# must cover both www.* and apex (or be a wildcard).

# ── HTTP: redirect to HTTPS + canonicalize to www ───────────────────
# Matches www.* hosts first (for single-hop redirect to HTTPS)
server {
    listen 80;
    server_name ~^www\..+$;
    return 301 https://$host$request_uri;
}

# Everything else (apex or unknown hosts) → HTTPS www
server {
    listen 80;
    server_name _;
    return 301 https://www.$host$request_uri;
}

# ── HTTPS: www.* → serve normally ───────────────────────────────────
server {
    listen 443 ssl;
    server_name ~^www\..+$;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include /etc/nginx/breatic-locations.conf;
}

# ── HTTPS: apex → 301 to www ────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://www.$host$request_uri;
}
