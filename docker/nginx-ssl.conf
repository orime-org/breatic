# HTTPS server — only active when SSL certs are available at /etc/nginx/certs/.
# Selected by entrypoint.sh when cert.pem + cert.key exist.
#
# Canonical domain enforcement: apex (non-www) is 301-redirected to www.
# This keeps all users on a single origin — localStorage/token/cookies
# are not split between www and non-www.
#
# The redirect uses a generic regex (not hardcoded to thinkai.cc/breatic.ai),
# so the same Docker image works for any deployment domain. SSL cert
# must cover both www.* and apex (or be a wildcard).
#
# Catch-all semantics note: `server_name _;` is just a non-matching
# placeholder name — it does NOT make the block a catch-all. The true
# catch-all for a listen address:port is the server marked
# `default_server`. Without it, nginx falls back to the FIRST listener
# on that port, which would pick the www-regex block and serve apex
# requests as if they were www. We therefore put the apex-redirect
# block first and mark it `default_server` so any Host that fails the
# www regex lands here and gets a 301 to www.

# ── HTTP: apex (and any non-www) → HTTPS www ───────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 301 https://www.$host$request_uri;
}

# ── HTTP: www.* → HTTPS (keep the www host) ────────────────────────
server {
    listen 80;
    server_name ~^www\..+$;
    return 301 https://$host$request_uri;
}

# ── HTTPS: apex (and any non-www) → 301 to www ─────────────────────
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://www.$host$request_uri;
}

# ── HTTPS: www.* → serve normally ──────────────────────────────────
server {
    listen 443 ssl;
    server_name ~^www\..+$;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include /etc/nginx/breatic-locations.conf;
}
