# Hocuspocus collaboration server configuration.
#
# These values can be tuned without code changes.
# Restart the collab service after editing.

# ── Server ────────────────────────────────────────
port: 1234

# ── Document Lifecycle ────────────────────────────
# Unload documents from memory when all clients disconnect.
# true = free memory immediately, false = keep in memory for fast reconnect.
unload_immediately: true

# Max time (ms) to wait before persisting a document after changes.
# Higher = fewer DB writes, lower = less data loss on crash.
debounce: 2000
max_debounce: 10000

# ── Document Size Limit ───────────────────────────
# Max Yjs document size in bytes (0 = unlimited).
# Rejects new updates that would push the document over this limit.
# A typical canvas with 100 nodes ≈ 200KB. Default 10MB covers most use cases.
max_document_bytes: 10485760     # 10 MB

# ── Connection Limits ─────────────────────────────
# Max WebSocket connections per document (0 = unlimited).
max_connections_per_document: 100

# ── Throttle ──────────────────────────────────────
# Coarse per-IP DoS backstop (loopback is exempt — see loopback-exempt-throttle.ts).
# One user opens many doc-connections (meta + every Space, x2 under dev StrictMode),
# so keep the threshold generous to avoid false-banning legitimate users; fine-grained
# abuse control belongs at the authenticated-user layer, not per-IP.
throttle_enabled: true
throttle_max_attempts: 200       # max connections per IP within the 60s window before a ban
throttle_ban_time: 1             # ban duration in MINUTES (the extension multiplies by 60*1000 — NOT ms)

# ── Persistence ───────────────────────────────────
# Quiet mode: suppress internal Hocuspocus logs (use our pino logger instead).
quiet: true

# ── Handling Lease (#1580) ────────────────────────
# 'handling' is fragile shared Yjs state; its driver (a browser uploading,
# a Worker running AIGC) can die silently. These tune the collab sweeper +
# disconnect cleanup — the ONLY consumer of these values (server/worker just
# stamp timestamps, web only renders the backend-authoritative result).
#
# NOT the same as worker.yaml's `lock_duration_ms` (10min): that is BullMQ's
# own stalled-worker detection (fast path → the worker.on failed net); THIS
# lease is the last-resort Yjs-node backstop (1h).
handling_lease:
  # Default lease budget (ms) per phase. A backend op has TWO phases, each
  # re-stamped and each measured against a budget: 'queued' (enqueue→pickup)
  # always uses this default; 'running' (execution) uses budget_overrides
  # below if the node's operation matches, else this default. 1h is generous
  # by design — its job is to bound rare zombies, not to fit op durations.
  default_budget_ms: 3600000        # 1 hour
  # Per-operation execution-budget overrides (ms), keyed by the canvas node's
  # `data.operation`. Raise for genuinely long ops (e.g. video export) so the
  # sweeper does not reclaim a live job. Empty = every op uses the default.
  budget_overrides: {}
  #   video_export: 7200000         # example: 2h for video export
