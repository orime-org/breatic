# Hunyuan3D Model Family — Tencent 3D Generation
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — t23d (text-to-3d) | i23d (image-to-3d)
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format

models:
  - name: "hunyuan3d-v3"
    display_name: "Hunyuan3D V3"
    mode: "t23d"
    tier: optional
    description: "Tencent, 3 quality tiers"
    guide: "Tencent's text-to-3D with three quality tiers: Geometry (mesh only, cheapest), Normal (with textures), and LowPoly (game-ready low-poly). Supports PBR and quad topology for LowPoly. Choose for flexible quality/cost tradeoff."
    cost_per_call: 25
    generation_time: 120
    params:
      prompt:
        description: "3D object description (max 1024 chars)"
        default: null
      generate_type:
        description: "Quality tier"
        default: "Normal"
        values: ["Normal", "LowPoly", "Geometry"]
      enable_pbr:
        description: "Enable PBR material textures"
        default: false
      face_count:
        description: "Target face count (40000-1500000)"
        default: 500000
    providers:
      - name: wavespeed
        model_id: "wavespeed-ai/hunyuan3d-v3/text-to-3d"
        priority: 1

  - name: "hunyuan3d-v3-i23d"
    display_name: "Hunyuan3D V3 Image-to-3D"
    mode: "i23d"
    tier: recommended
    description: "Multi-view input, PBR support"
    guide: "Tencent's image-to-3D with optional multi-view input (front + back/left/right images for higher fidelity). Same quality tiers as text-to-3D. Multi-view costs more but produces more accurate geometry. Choose for high-fidelity reconstruction."
    cost_per_call: 23
    generation_time: 120
    params:
      image:
        description: "Front view image URL"
        default: null
      back_image:
        description: "Back view image URL (optional)"
        default: null
      left_image:
        description: "Left view image URL (optional)"
        default: null
      right_image:
        description: "Right view image URL (optional)"
        default: null
      generate_type:
        description: "Quality tier"
        default: "Normal"
        values: ["Normal", "LowPoly", "Geometry"]
      enable_pbr:
        description: "Enable PBR material textures"
        default: false
      face_count:
        description: "Target face count (40000-1500000)"
        default: 500000
    providers:
      - name: wavespeed
        model_id: "wavespeed-ai/hunyuan3d-v3/image-to-3d"
        priority: 1

  - name: "hunyuan3d-v3.1-rapid"
    display_name: "Hunyuan3D V3.1 Rapid"
    mode: "i23d"
    tier: recommended
    description: "Ultra-fast, cheapest i23d"
    guide: "Ultra-fast image-to-3D at the lowest cost ($0.02). Single image input, no configuration needed. Best for quick prototyping or bulk 3D asset generation. Choose when speed and cost matter more than quality."
    cost_per_call: 2
    generation_time: 30
    params:
      image:
        description: "Input image URL (JPG/PNG/WEBP)"
        default: null
    providers:
      - name: wavespeed
        model_id: "wavespeed-ai/hunyuan-3d-v3.1/image-to-3d-rapid"
        priority: 1
