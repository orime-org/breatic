# Seedance Video Models (ByteDance) — 2.0, 1.5
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — t2v, i2v, ref, extend
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)


models:
  - name: "seedance-1.5-pro-i2v"
    display_name: "Seedance 1.5 Pro I2V"
    mode: "i2v"
    tier: optional
    description: "Seedance 1.5 image-to-video"
    guide: "Animate an image into a video using Seedance 1.5 Pro. Supports end frame guidance, camera lock, and audio generation. Duration 4-12s, up to 1080p."
    cost_per_call: 60
    generation_time: 120
    params:
      prompt:
        description: "Scene description"
        default: null
      image:
        description: "First frame image URL"
        default: null
      end_image:
        description: "End frame image URL"
        default: null
      aspect_ratio:
        description: "Output aspect ratio"
        values: ["16:9", "9:16", "1:1", "4:3", "3:4"]
        default: "16:9"
      resolution:
        description: "Output resolution"
        values: ["480p", "720p", "1080p"]
        default: "720p"
      duration:
        description: "Video length in seconds"
        min: 4
        max: 12
        default: 5
      generate_audio:
        description: "Generate audio track"
        values: [true, false]
        default: false
      camera_fixed:
        description: "Lock camera position"
        values: [true, false]
        default: false
      seed:
        description: "Random seed for reproducibility"
        default: -1
    providers:
      - name: byteplus
        model_id: "seedance-1.5-pro-i2v"
        priority: 1
      - name: wavespeed
        model_id: "bytedance/seedance-v1.5-pro/image-to-video"
        priority: 2

  # -- Seedance 2.0 ------------------------------------------------------------

  - name: "seedance-2.0"
    display_name: "Seedance 2.0"
    mode: "t2v"
    tier: recommended
    description: "ByteDance latest, multimodal refs"
    guide: "ByteDance's latest cinematic video generator. Supports up to 4 reference images. Duration 5-15s at 2K resolution. Best for high-quality cinematic content."
    cost_per_call: 80
    generation_time: 180
    params:
      prompt:
        description: "Scene description"
        default: null
      aspect_ratio:
        description: "Output aspect ratio"
        values: ["16:9", "9:16", "4:3", "3:4"]
        default: "16:9"
      duration:
        description: "Video length in seconds"
        values: [5, 10, 15]
        default: 5
      seed:
        description: "Random seed for reproducibility"
        default: -1
    providers:
      - name: byteplus
        model_id: "seedance-2.0"
        priority: 1
      - name: wavespeed
        model_id: "wavespeed-ai/cinematic-video-generator"
        priority: 2

