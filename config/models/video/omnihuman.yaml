# OmniHuman Video Models (ByteDance) — Talking Head
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — talking_head
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)


models:
  - name: "omnihuman-1.5"
    display_name: "OmniHuman 1.5"
    mode: "talking_head"
    tier: recommended
    description: "Portrait + audio talking head"
    guide: "ByteDance's talking head generator. Provide a portrait image and audio file to create a talking head video. Duration matches audio length. Resolution depends on input image."
    cost_per_call: 25
    generation_time: 180
    params:
      image:
        description: "Portrait image URL"
        default: null
      audio:
        description: "Audio file URL (WAV/MP3)"
        default: null
      seed:
        description: "Random seed for reproducibility"
        default: -1
    providers:
      - name: wavespeed
        model_id: "bytedance/avatar-omni-human-1.5"
        priority: 1
