# Fish Audio Model Family — S2 Pro TTS
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — tts (text-to-speech)
#   param names          — user-facing; model family code converts to API format

models:
  - name: "fish-s2-pro"
    display_name: "Fish S2 Pro"
    mode: "tts"
    tier: recommended
    description: "TTS-Arena #1, 80+ languages, emotion"
    guide: "Fish Audio's flagship TTS ranked #1 on TTS-Arena. Dual-AR architecture (4B + 400M params), 80+ languages with auto-detection, free-form emotion control via natural language tags like [whisper], [excited], [professional broadcast tone], [pitch up]. Sub-word-level prosody control, 15,000+ expression tags. 70-80% cheaper than ElevenLabs. Choose for any TTS task where cost-effectiveness matters without sacrificing quality."
    cost_per_call: 3
    generation_time: 10
    languages:
      - English
      - Chinese
      - Japanese
      - Korean
      - French
      - German
      - Spanish
      - Portuguese
      - Italian
      - Dutch
      - Polish
      - Russian
      - Arabic
      - Thai
      - Vietnamese
      - Indonesian
      - Hindi
      - Turkish
      - Swedish
      - Norwegian
      - Danish
      - Finnish
      - Czech
      - Hungarian
      - Romanian
      - Greek
      - Hebrew
      - Ukrainian
      - Filipino
      - Malay
    # Uses reference_id (UUID) from fish.audio for voice selection.
    # Users browse and select voices at https://fish.audio
    voices: []
    params:
      text:
        description: "Text to convert to speech"
        default: null
      reference_id:
        description: "Preset voice ID (UUID from fish.audio)"
        default: null
      speed:
        description: "Playback speed (0.5-2.0)"
        default: 1.0
      volume:
        description: "Volume adjustment (-20 to 20 dB)"
        default: 0
      format:
        description: "Output audio format"
        values: ["wav", "mp3", "pcm"]
        default: "wav"
    providers:
      - name: fish
        model_id: "s2-pro"
        priority: 1
