# ElevenLabs TTS Model Family — High-Quality Text-to-Speech
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — tts (text-to-speech)
#   param names          — user-facing; model family code converts to API format

models:
  - name: "elevenlabs-v3"
    display_name: "ElevenLabs V3"
    mode: "tts"
    tier: recommended
    description: "Most natural, emotional speech"
    guide: "Most expressive TTS model with natural emotion and intonation. 70+ languages, 5000 char limit. 50+ preset voices covering diverse accents, ages, and styles. Choose for the highest-quality single-speaker voiceover, narration, or dialogue where naturalness matters most."
    cost_per_call: 10
    generation_time: 30
    languages:
      - English
      - Chinese
      - Japanese
      - Korean
      - French
      - German
      - Spanish
      - Portuguese
      - Italian
      - Dutch
      - Polish
      - Russian
      - Arabic
      - Hindi
      - Turkish
      - Vietnamese
      - Thai
      - Indonesian
      - Swedish
      - Czech
      - Romanian
      - Ukrainian
      - Greek
      - Hungarian
      - Finnish
      - Danish
      - Norwegian
      - Tamil
      - Filipino
    voices:
