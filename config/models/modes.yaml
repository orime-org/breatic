# Mode definitions for AIGC providers.
# Each modality lists its supported modes with human-readable labels,
# descriptions, required inputs, and intent-based selection guidance.
# This file is the single source of truth — SKILL.md files and
# skills_loader.py both read from here via {available_modes} injection.

image:
  modes:
    t2i:
      label: text-to-image
      description: >
        Generate a new image from a text description. May include style
        reference images for consistent style, but the output is a new
        creation — not a modification of the reference.
      required_inputs: [prompt]
    i2i:
      label: image-to-image
      description: >
        Generate a new image using a reference image for style, composition,
        or content guidance. The output is a new creation inspired by the
        reference — not a direct modification of it.
      required_inputs: [prompt, image_url]
    edit:
      label: image editing
      description: >
        Modify specific content of an existing image — add, remove, or
        replace elements, change text, apply style transfer. The source
        image is preserved with only targeted changes applied.
      required_inputs: [prompt, image_url]
    upscale:
      label: image upscaling
      description: >
        Enlarge an image to higher resolution (2K/4K/8K) while preserving
        detail and sharpness. Standard or creative (prompt-guided) modes.
      required_inputs: [image_url]
    relight:
      label: relighting
      description: >
        Change the lighting of an existing image — adjust light direction,
        brightness, color temperature, and rim light without altering content.
      required_inputs: [image_url]
    multi_angle:
      label: multi-angle view
      description: >
        Generate different camera angles from a single input image.
        Rotates, tilts, and zooms the virtual camera while keeping
        subjects, lighting, and texture consistent.
      required_inputs: [image_url]

    sharpen:
      label: image sharpening
      description: >
        Sharpen a blurry or soft image — correct lens blur, motion blur,
        or general softness while preserving natural texture.
      required_inputs: [image_url]
    denoise:
      label: image denoising
      description: >
        Remove noise and grain from an image — clean up high-ISO,
        low-light, or heavily compressed photos while preserving detail.
      required_inputs: [image_url]
    restore:
      label: image restoration
      description: >
        Restore old or damaged photos — remove dust, scratches, and
        surface damage from scanned or vintage photographs.
      required_inputs: [image_url]
    adjust:
      label: image adjustment
      description: >
        Adjust image exposure, white balance, or colorize black-and-white
        photos. AI-powered pixel-level correction, not global sliders.
      required_inputs: [image_url]
    remove_bg:
      label: background removal
      description: >
        Remove the background from an image, outputting the subject
        on a transparent background with precise alpha matting.
      required_inputs: [image_url]

  selection_guide: |
    - User wants to create something new (with or without style references) → t2i
    - User wants to generate a new image based on a reference image → i2i
    - User wants to modify/edit specific parts of an existing image → edit
    - User wants to enlarge/upscale an image to higher resolution → upscale
    - User wants to change the lighting of an image → relight
    - User wants to see an image from different angles → multi_angle
    - User wants to sharpen a blurry or soft image → sharpen
    - User wants to remove noise or grain from a photo → denoise
    - User wants to restore an old or damaged photo → restore
    - User wants to fix exposure, white balance, or colorize B&W → adjust
    - User wants to remove the background from an image → remove_bg

video:
  modes:
    t2v:
      label: text-to-video
      description: >
        Generate a new video from a text description. No media input needed.
      required_inputs: [prompt]
    i2v:
      label: image-to-video
      description: >
        Animate a still image into a video. The image becomes the first frame.
      required_inputs: [prompt, image_url]
    ref:
      label: reference-to-video
      description: >
        Generate a video using 1+ reference images for character/style
        consistency. Unlike i2v, the references guide style rather than
        being the first frame.
      required_inputs: [prompt, img_urls]
    extend:
      label: video extension
      description: >
        Continue an existing video with consistent style and motion.
      required_inputs: [video_url]
    edit:
      label: video editing
      description: >
        Modify the content of an existing video (add/remove/change elements).
      required_inputs: [prompt, video_url]
    motion:
      label: motion control
      description: >
        Drive character movement using a reference image and motion description.
      required_inputs: [image_url, prompt]
    animate:
      label: image animation
      description: >
        Animate a character image with driving motion.
      required_inputs: [image_url]
    talking_head:
      label: digital human
      description: >
        Generate a talking head video from a portrait image and audio.
      required_inputs: [image_url, audio_url]
    upscale:
      label: video upscaling
      description: >
        Enhance resolution of an existing video (e.g. 720p to 4K) while
        preserving detail and temporal consistency.
      required_inputs: [video_url]
    interpolate:
      label: frame interpolation
      description: >
        Increase frame rate by inserting AI-generated intermediate frames
        for smoother motion or slow-motion effects.
      required_inputs: [video_url]

  selection_guide: |
    - User describes a scene with NO media → **t2v**
    - User has a single image to animate → **i2v**
    - User has multiple reference images for character/style consistency → **ref**
    - User has a video to continue → **extend**
    - User has a video to modify → **edit**
    - User wants motion-driven character animation → **motion** or **animate**
    - User has a portrait + audio for talking head → **talking_head**
    - User wants to upscale/enhance video resolution → **upscale**
    - User wants smoother motion, higher frame rate, or slow motion → **interpolate**

audio:
  modes:
    t2m:
      label: text-to-music
      description: >
        Generate music from a text description of genre, mood, instruments,
        and optional lyrics. No reference audio needed.
      required_inputs: [prompt]
    a2m:
      label: audio-to-music
      description: >
        Generate new music using a reference audio track for style, voice,
        or instrumental guidance. The reference shapes the output style.
      required_inputs: [audio_url]
    sfx:
      label: sound effects
      description: >
        Generate sound effects or ambient audio from a text description.
        Short-form audio clips for Foley, UI sounds, or environmental audio.
      required_inputs: [prompt]
    separate:
      label: audio separation
      description: >
        Separate vocals from instrumental in any audio track. Outputs
        isolated vocal or instrumental stem.
      required_inputs: [audio_url]

  selection_guide: |
    - User describes music to create from scratch (with or without lyrics) → **t2m**
    - User provides a reference song/voice/instrumental to guide generation → **a2m**
    - User wants sound effects, ambient audio, or Foley → **sfx**
    - User wants to separate vocals from instrumental → **separate**

tts:
  modes:
    tts:
      label: text-to-speech
      description: >
        Convert text into natural-sounding speech. Supports single or
        multi-speaker dialogue, emotion control, and multiple languages.
      required_inputs: [text]
    voice_clone:
      label: voice cloning
      description: >
        Clone a voice from a short reference audio sample, then synthesize
        new speech in that voice. No fine-tuning required.
      required_inputs: [text, reference_audio]

  selection_guide: |
    - User wants to convert text to speech or generate voiceover → **tts**
    - User wants to clone a specific voice from a sample → **voice_clone**

three_d:
  modes:
    t23d:
      label: text-to-3d
      description: >
        Generate a 3D model from a text description. Outputs mesh with
        textures in GLB/FBX/OBJ format. Supports PBR materials, topology
        control, and polycount targeting.
      required_inputs: [prompt]
    i23d:
      label: image-to-3d
      description: >
        Convert one or more 2D images into a 3D model. Single-image input
        for quick conversion, multi-view input for higher fidelity. Some
        models support mask-based object extraction.
      required_inputs: [image_url]

  selection_guide: |
    - User describes a 3D object to create from scratch → **t23d**
    - User has an image and wants to convert it to 3D → **i23d**

understand:
  modes:
    vi:
      label: image understanding
      description: >
        Analyze one or more images — describe content, extract text (OCR),
        reverse-engineer generation prompts, identify style/composition,
        or compare multiple images.
      required_inputs: [image_url, prompt]
    vv:
      label: video understanding
      description: >
        Analyze a video — describe scenes, identify actions and camera
        movements, reverse-engineer video generation prompts, or extract
        temporal narrative structure.
      required_inputs: [video_url, prompt]
    va:
      label: audio understanding
      description: >
        Analyze audio — describe music style and mood, identify instruments,
        transcribe lyrics, reverse-engineer audio generation prompts, or
        classify genre and emotion.
      required_inputs: [audio_url, prompt]
    transcribe:
      label: speech-to-text
      description: >
        Transcribe audio to text with high accuracy. Supports 50+ languages
        with auto-detection. Optional word-level timestamps and translation
        to English.
      required_inputs: [audio_url]

  selection_guide: |
    - User has an image and wants to understand/describe/analyze it → **vi**
    - User has a video and wants to understand/describe/analyze it → **vv**
    - User has audio and wants to understand/describe/analyze it → **va**
    - User has audio and wants accurate text transcription → **transcribe**
