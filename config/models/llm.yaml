# LLM Provider Configuration
# Guidelines:
#   model.description    — max 80 chars (shown in UI model selector)
#   param.description    — max 50 chars (shown as tooltip / help text)
#   provider.priority    — lower number = tried first; direct API as 1, OpenRouter as 2

default_model: "claude-sonnet-4.6"

models:
  # ── Anthropic ────────────────────────────────────────────────────────────
  - name: "claude-opus-4.6"
    display_name: "Claude Opus 4.6"
    description: "Anthropic's most capable model. Complex reasoning and creative planning."
    params:
      max_tokens:
        description: "Maximum tokens in the response"
        default: 8192
      temperature:
        description: "Sampling temperature (0=deterministic, 1=creative)"
        default: 0.7
    providers:
      - name: anthropic
        model_id: "claude-opus-4-6"
        credits_per_1k_tokens: 0.5
        priority: 1
      - name: openrouter
        model_id: "anthropic/claude-opus-4-6"
        credits_per_1k_tokens: 0.5
        priority: 2

  - name: "claude-sonnet-4.6"
    display_name: "Claude Sonnet 4.6"
    description: "Anthropic's balanced model. Strong reasoning, coding, fast response."
    params:
      max_tokens:
        description: "Maximum tokens in the response"
        default: 8192
      temperature:
        description: "Sampling temperature (0=deterministic, 1=creative)"
        default: 0.7
    providers:
      - name: anthropic
        model_id: "claude-sonnet-4-6"
        credits_per_1k_tokens: 0.1
        priority: 1
      - name: openrouter
        model_id: "anthropic/claude-sonnet-4-6"
        credits_per_1k_tokens: 0.1
        priority: 2

  # ── OpenAI ───────────────────────────────────────────────────────────────
  - name: "gpt-5.4"
