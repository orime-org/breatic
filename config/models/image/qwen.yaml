# Qwen Image Models (Alibaba DashScope) — Multi-Angle
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — t2i, i2i, multi_angle
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)

models:
  # -- Qwen Multi-Angle (multi_angle) --------------------------------------------

  - name: "qwen-multi-angle"
    display_name: "Qwen Multi-Angle"
    mode: "multi_angle"
    tier: recommended
    description: "Multi-angle view from single image"
    guide: "Generate different camera angles from a single input image. Uses a 96-pose camera system to rotate, tilt, and zoom the virtual camera while keeping subjects, lighting, and texture consistent. Ideal for e-commerce product photography, 3D asset creation, character design turnarounds, and creative content needing multiple viewpoints. Specify horizontal_angle (0-359) for rotation, vertical_angle (-30 to 60) for elevation, and distance (0=close, 1=medium, 2=wide). Use prompt to request special lens effects such as fisheye or wide-angle distortion."
    cost_per_call: 2.5
    generation_time: 30
    params:
      image:
        description: "Source image URL (required)"
        default: null
      horizontal_angle:
        description: "Horizontal rotation 0-359 degrees"
        min: 0
        max: 359
        default: 0
      vertical_angle:
        description: "Vertical elevation -30 to 60 degrees"
        min: -30
        max: 60
        default: 0
      distance:
        description: "Camera distance (0=close, 1=medium, 2=wide)"
        values: [0, 1, 2]
        default: 1
      prompt:
        description: "Optional guidance (e.g. 'fisheye lens', 'wide-angle')"
        default: null
    providers:
      - name: wavespeed
        model_id: "wavespeed-ai/qwen-image/edit-multiple-angles"
        priority: 1
