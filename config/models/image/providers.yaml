# Shared provider configuration for all image models (t2i, i2i, post).
# Each provider defines: base_url, api_key_env, timeout, max_concurrency.

wavespeed:
  base_url: "https://api.wavespeed.ai/api/v3"
  api_key_env: WAVESPEED_API_KEY
  timeout: 120
  max_concurrency: 50
google:
  base_url: "https://generativelanguage.googleapis.com/v1beta"
  api_key_env: GOOGLE_API_KEY
  timeout: 120
  max_concurrency: 50
byteplus:
  base_url: "https://ark.ap-southeast.bytepluses.com/api/v3"
  api_key_env: BYTEPLUS_API_KEY
  timeout: 120
  max_concurrency: 50
dashscope:
  base_url: "https://dashscope-intl.aliyuncs.com/api/v1"
  api_key_env: DASHSCOPE_API_KEY
  timeout: 120
  max_concurrency: 50
topaz:
  base_url: "https://api.topazlabs.com/image/v1"
  api_key_env: TOPAZ_API_KEY
  timeout: 120
  max_concurrency: 50
