# Background Remove Models — AI Background Removal
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — remove_bg
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)

models:
  # -- Background Remover (remove_bg) ------------------------------------

  - name: "bg-remover"
    display_name: "Background Remover"
    icon: "background-remover"
    mode: "remove_bg"
    tier: internal
    description: "AI background removal with alpha matte"
    guide: "Remove the background from any image with AI-powered subject detection. Outputs a transparent PNG with 256-level alpha matting for clean edges on hair, fur, and complex boundaries. Fully automatic — no manual selection needed. Best for product photos, portraits, and asset extraction."
    cost_per_call: 1
    generation_time: 15
    params:
      image:
        description: "Source image URL (required)"
        default: null
    providers:
      - name: wavespeed
        model_id: "wavespeed-ai/image-background-remover"
        priority: 1
