# Midjourney Image Models — V7 (t2i only)
#
# WaveSpeed's Midjourney catalog shrank to text-to-image only (2026-07-15
# audit, #1683): the niji variant and both image-to-image endpoints were
# delisted (sitemap + model-page evidence). Their prior entries live in git
# history; re-adding any of them requires a live provider endpoint first —
# see packages/worker/src/providers/__tests__/model-config-liveness.test.ts.
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — t2i
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)

models:
  # -- Midjourney V7 (t2i) -------------------------------------------------------

  - name: "midjourney-v7"
    display_name: "Midjourney V7"
    icon: "midjourney"
    mode: "t2i"
    tier: recommended
    description: "Top aesthetics, artistic imagery"
    guide: "Highest aesthetic quality among all models. Exceptional at artistic, cinematic, and editorial imagery. Strong compositional awareness, 40% fewer anatomical errors. Weak at text rendering. Supports one style reference image (style_images). Choose for marketing visuals, concept art, and images where aesthetic beauty is paramount."
    cost_per_call: 10
    generation_time: 60
    params:
      aspect_ratio:
        description: "Aspect ratio of the output image"
        values: ["1:1", "3:2", "2:3", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9"]
        default: "1:1"
      resolution:
        description: "Output resolution"
        values: ["1k", "2k"]
        default: "2k"
      stylize:
        description: "Artistic style strength (0-1000)"
        default: 100
      chaos:
        description: "Variation between 4 images (0-100)"
        default: 0
      weird:
        description: "Surreal experimental level (0-3000)"
        default: 0
      style_images:
        description: "Style reference image URL"
        type: "list"
        max_items: 1
        default: null
      seed:
        description: "Random seed for reproducibility"
        default: -1
    providers:
      - name: wavespeed
        model_id: "midjourney/text-to-image"
        priority: 1
