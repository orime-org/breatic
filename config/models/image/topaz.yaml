# Topaz Image Models — Upscale (V1 mini-tool surface).
#
# B5 trim: sharpen / denoise / restore / adjust / upscale-creative model
# entries removed because their mini-tool routes were dropped per
# `design/project/02-mini-tool-system.md` §2.2 (V1 image roster =
# remove-bg / upscale / inpaint). Git history (B5 commit) has the full
# prior definitions if a future PR re-enables any of them.
#
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — upscale
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)

models:
  # -- Topaz Upscale (upscale) ---------------------------------------------------

  - name: "topaz-upscale"
    display_name: "Topaz Upscale"
    icon: "topaz"
    mode: "upscale"
    tier: internal
    description: "AI upscale to 2K/4K/8K"
    guide: "Professional AI image upscaling. Enlarges images to target resolution (2K/4K/8K) while preserving original aspect ratio and adding real detail. Provide source_width and source_height so the system can calculate the correct output dimensions. Standard V2 model handles most cases well. Max output 32000px per side. Choose for enlarging low-res images to print or display quality."
    cost_per_call: 7
    generation_time: 30
    params:
      image:
        description: "Source image URL (required)"
        default: null
      output_resolution:
        description: "Target resolution for the long edge"
        values: ["2k", "4k", "8k"]
        default: null
      source_width:
        description: "Original image width in pixels"
        default: null
      source_height:
        description: "Original image height in pixels"
        default: null
    providers:
      - name: topaz
        model_id: "enhance"
        credit_price: 0.0005
        priority: 1
      - name: wavespeed
        model_id: "topaz/image/enhance"
        priority: 2
