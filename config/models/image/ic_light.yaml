# IC-Light Models — V2 Relighting
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — relight
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)

models:
  # -- IC-Light V2 (relight) -----------------------------------------------------

  - name: "ic-light-v2"
    display_name: "IC-Light V2"
    mode: "relight"
    tier: internal
    description: "AI relighting with direction and temperature"
    guide: "Relight any image with AI-controlled lighting. Supports 6 light directions, brightness (0-100%), color temperature (2000-10000K), and rim light toggle. For advanced users, provide a free-text prompt describing the desired lighting — the system auto-converts it to optimal parameters. Best for portraits, product photos, and scene mood changes."
    cost_per_call: 20
    generation_time: 15
    params:
      image:
        description: "Source image URL (required)"
        default: null
      light_source:
        description: "Main light direction"
        values: ["none", "left", "right", "top", "bottom", "front"]
        default: "none"
      brightness:
        description: "Light brightness percentage"
        min: 0
        max: 100
        default: 50
      light_temperature:
        description: "Color temperature in Kelvin"
        min: 2000
        max: 10000
        default: 5600
      rim_light:
        description: "Enable rim light from behind"
        values: [true, false]
        default: false
      prompt:
        description: "Free-text lighting description (advanced)"
        default: null
    providers:
      - name: wavespeed
        model_id: "wavespeed-ai/ic-light"
        priority: 1
