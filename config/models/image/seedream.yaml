# Seedream Image Models (ByteDance) — 5.0 Lite
# Guidelines:
#   model.description    — max 40 chars (shown in UI model selector, keep short)
#   model.guide          — 2-3 sentences (injected into Skill prompt, helps LLM choose model)
#   model.mode           — t2i, i2i
#   param.description    — max 50 chars (shown as tooltip / help text)
#   param.max_items      — max number of items for list-type params (used by frontend + validation)
#   param.default        — every param MUST have a default (used as fallback for invalid values)
#   param names          — user-facing; model family code converts to API format
#   provider.priority    — lower number = tried first
#   cost_per_call        — estimated credits per call (1 credit = 1 US cent), display only
#   generation_time      — max generation time in seconds (worst case)

models:
  # -- Seedream 5.0 Lite (t2i) ---------------------------------------------------

  - name: "seedream-5.0-lite"
    display_name: "Seedream 5.0 Lite"
    icon: "seedream"
    mode: "t2i"
    tier: recommended
    description: "Latest, reasoning + web search"
    guide: "Intelligence-first model with web search and spatial reasoning. Best at infographics, diagrams, labeled illustrations, and knowledge-rich content. Supports one style reference image. Fast (~3-5s). Less photorealistic than 4.5 but better prompt understanding. Choose for content requiring real-time knowledge or complex layouts."
    cost_per_call: 4
    generation_time: 20
    params:
      aspect_ratio:
        description: "Aspect ratio of the output image"
        values: ["1:1", "3:2", "2:3", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9"]
        default: "1:1"
      resolution:
        description: "Output resolution"
        values: ["1k", "2k", "4k"]
        default: "2k"
      style_images:
        description: "Style reference image URL"
        type: "list"
        max_items: 1
        default: null
    providers:
      - name: byteplus
        model_id: "seedream-5-0-260128"
        priority: 1
      - name: wavespeed
        model_id: "bytedance/seedream-v5.0-lite"
        priority: 2


