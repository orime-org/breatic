name: CI

on:
  push:
    branches: [main, test_thinkai_cc]
    tags: ['v*']
  pull_request:
    branches: [main]

# Action versions are tracked to major (e.g. @v6). These majors are all the
# Node.js 24 runtime releases — pinning below major would require manual
# bumps for every security patch. See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# for the Node 20 → 24 runner deprecation timeline that drove these bumps.

jobs:
  dev-proxy-guard:
    name: Dev Proxy Guard
    runs-on: ubuntu-latest

    # Defense in depth with .husky/pre-commit: block PRs/pushes where
    # packages/web/vite.config.ts routes /api, /uploads, or /ws to a
    # deployed host (thinkai.cc / breatic.ai). Those proxy targets must
    # stay on localhost so every developer's `pnpm dev` hits their own
    # API/Collab. See BUG-2 post-mortem for the regression that motivated
    # this check.
    steps:
      - uses: actions/checkout@v6

      - name: Check vite.config.ts proxy targets
        run: |
          offenders=$(grep -nE 'target:[[:space:]]*["'\''].*(thinkai\.cc|breatic\.ai)' \
            packages/web/vite.config.ts || true)
          if [ -n "$offenders" ]; then
            echo "::error file=packages/web/vite.config.ts::Dev proxy target must be localhost, not a deployed host"
            echo "Offending lines:"
            echo "$offenders"
            echo
            echo "Expected:"
            echo "  /api/     → http://localhost:3000"
            echo "  /uploads/ → http://localhost:3000"
            echo "  /ws       → ws://localhost:1234"
            exit 1
          fi
          echo "✅ vite.config.ts proxy targets are localhost-only"

  no-noaccount-residue:
    name: No NoAccount Mode Residue
    runs-on: ubuntu-latest

    # Defense against re-introduction of the deprecated NoAccount dev-bypass
    # auth mode (deleted in PR-a 2026-05-26). Scans backend code + scripts
    # + turbo.json for forbidden tokens (LOGIN_MODE / NoAccount /
    # dev-fixed-token / DEV_USER_ID). PR-b will extend the script's scan
    # range to packages/web/ + docs/ + .env.* templates once the frontend
    # bypass code is cleaned. See spec amend 2026-05-26 § 8.1 for the
    # invariant + scripts/check-no-noaccount.sh for scan logic.
    steps:
      - uses: actions/checkout@v6

      - name: Run check-no-noaccount.sh
        run: ./scripts/check-no-noaccount.sh

  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Install ffmpeg (worker video-handler tests)
        # Worker `src/__tests__/handlers/local/video-*.test.ts` spawn
        # ffmpeg for fixture generation + assertion. ubuntu-latest does
        # not bundle it, so install via apt-get explicitly. The ~30s
        # install is the cost of actually running the video-processing
        # unit tests in CI.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Lint hover patterns
        # Enforce inner ADR 2026-05-21-hover-pattern-standard: ban
        # `hover:bg-<token>/<2-digit>` Tailwind alpha-modifier hovers
        # in packages/web/src — solid token swap or `hover:opacity-90`
        # only. Fast grep; hard-fails the PR on violation.
        run: pnpm lint:hover

      - name: Lint no raw brand usage (monochrome chrome rule)
        # Enforce chrome-baseline §F10 Monochrome Chrome Rule: ban raw brand
        # tokens (bg/text/border/ring-brand-N, var(--brand-...)) in
        # packages/web/src outside the whitelist (theme/tokens.css,
        # --brand-logo-primary, pages/studio/**). Studio is the sole exemption
        # via --brand-accent / --brand-fg / --brand-tint. Authorizing ADR:
        # breatic-inner-design design/decisions/2026-06-05-studio-brand-exemption.md
        run: pnpm lint:no-brand-usage

      - name: Lint no raw design values (anti-drift token guard)
        # Design-system 9th rebuild anti-drift gate: ban raw px font sizes
        # (text-[Npx]), raw neutral primitives ([var(--neutral-N)]), raw radius
        # (rounded-[Npx]), and raw hex colors in packages/web/src — components
        # must consume design tokens, never hardcode values. Correct token
        # consumption (h-[var(--btn-chrome)] etc.) is allowed. Logo (BrandMark) +
        # inpaint brush ink + theme/tokens.css are exempt. See
        # scripts/lint-no-raw-design-values.sh.
        run: pnpm lint:no-raw-design-values

      - name: Lint no-extreme token values (design-system 9th rigid guard)
        # Lock the pure-neutral + off-extreme + scheme-D status-readability
        # invariants of theme/tokens.css: every --neutral-* / direct-hex
        # --color-* is R=G=B and bounded (no channel brighter than #f5 / darker
        # than #12, never #fff/#000), and every status -foreground clears WCAG
        # AA 4.5:1 on its tint bg in both modes. See
        # scripts/lint-no-extreme-token-value.sh.
        run: pnpm lint:no-extreme-token-value

      - name: Lint 1px borders / focus rings (rigid 1px guard)
        # Enforce the rigid "all borders & focus rings are 1px solid, no glow"
        # rule across packages/web/src: bans ring-offset, ring width >= 2, and
        # border width >= 2. See scripts/lint-1px-border.sh.
        run: pnpm lint:1px-border

      - name: Lint active-border consistency (one neutral activation border)
        # A NEUTRAL border expressing selection/activation must be
        # border-active-border (the Input focus colour) — no border-primary /
        # border-foreground stand-ins (user-ratified 2026-07-11). Colour
        # borders (border-status-*) are a separate system. shadcn vendor
        # (components/ui) exempt per ADR 14. See scripts/lint-active-border.sh.
        run: pnpm lint:active-border

      - name: Lint no-inline-scrollbar (one Scroller component)
        # Every visible scroller uses OUR Scroller component
        # (components/ui/scroll-area.tsx), vertical AND horizontal (#1773,
        # user-ratified 2026-07-15): overlay bar, scroll-only visibility, no
        # layout space, hover = color only, input state (focus/selection)
        # untouched by scrollbar interaction. Banned in components: raw
        # overflow-* scrollers outside the component, webkit scrollbar paint
        # rules, scrollbar-width/scrollbar-color re-declarations. Hiding via
        # scrollbar-width:none stays allowed (SpaceTabBar). See
        # scripts/lint-no-inline-scrollbar.sh.
        run: pnpm lint:no-inline-scrollbar

      - name: Lint single tooltip provider (one app-level provider)
        # The app mounts exactly ONE <TooltipProvider> (App.tsx); its
        # delayDuration is the calibrated timing every tooltip shares, and
        # Radix skip-delay grouping works only within one provider. A
        # component nesting its own provider overrides the timing and splits
        # skip-delay — the bug that shipped twice (GenerateToolbar 300ms #337,
        # ThumbnailHoverPreview 200ms). Tooltips inherit the app provider;
        # TipTap NodeViews too (createPortal inherits context). See
        # scripts/lint-single-tooltip-provider.sh.
        run: pnpm lint:single-tooltip-provider

      - name: Lint single toast entry (one wrapper — typed + de-duped)
        # Every toast routes through @web/lib/toast, never sonner directly. The
        # wrapper exposes only typed methods (subsumes the old "toast must be
        # typed" rule — a bare toast()/message() can't compile against it) and
        # adds a content-derived id so identical repeats refresh one toast
        # instead of stacking (user 2026-07-18). See
        # scripts/lint-single-toast-entry.sh.
        run: pnpm lint:single-toast-entry

      - name: Lint overlay surface (popover panel unification)
        # Every popover/overlay panel surface uses bg-popover (tooltip inverse
        # is the only exception): bans bg-elevated / bg-card as a panel bg in
        # the overlay component set. See scripts/lint-overlay-surface.sh.
        run: pnpm lint:overlay-surface

      - name: Lint storage-key-prefix (web persisted keys)
        # Enforce user decision 2026-06-08: every localStorage / sessionStorage
        # key carries the `breatic.` prefix, routed through the central registry
        # packages/web/src/lib/storage-keys.ts (STORAGE_KEYS.*). Bans bare
        # non-prefixed key literals that risk a silent same-origin storage
        # collision with extensions / sibling apps. The pre-React inline script
        # in src/index.html is prefix-checked too (it cannot import the
        # registry). See scripts/lint-storage-key-prefix.sh for scope.
        run: pnpm lint:storage-key-prefix

      - name: Lint no-CJK in production source + YAML config
        # Enforce inner DD 2026-05-22-breatic-i18n-migration-rev-3 +
        # CLAUDE.md prohibition list #13 "no CJK in YAML" (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): every user-facing string must
        # live in locales/*.json and route through the shared t() helper,
        # and code / comments / YAML config must be English. This grep
        # hard-fails the PR if any production .ts / .tsx / .css or any
        # config/workflow YAML (pnpm-lock excluded) carries hardcoded CJK
        # (tests + vendored shadcn primitives are exempted; see
        # scripts/lint-no-cjk.sh).
        run: pnpm lint:no-cjk

      - name: Lint no-trojan-source (CVE-2021-42574 security)
        # Enforce the source character-set SECURITY guard (CI maximal-
        # strictness guard suite, inner ADR 2026-06-01): block Trojan Source
        # attacks — bidirectional-override + invisible control characters
        # that make the code a human reviewer sees differ from what the
        # compiler parses (a hidden logic flip can pass review this way).
        # Detection is anti-trojan-source's public hasConfusablesInFiles API
        # (scripts/check-trojan-source.mjs), not its bin/ CLI (which crashes
        # on Node 24). This is the security half of the charset story; the
        # readability half (no CJK comments) is lint:no-cjk above. It only
        # flags the dangerous bidi / zero-width subset — ordinary non-ASCII
        # text (CJK, accents, typography, emoji) is NOT flagged. Hard-fails
        # the PR. See scripts/lint-no-trojan-source.sh.
        run: pnpm lint:no-trojan-source

      - name: Lint no-translated-product-noun (i18n DNT glossary)
        # Enforce the product-term do-not-translate glossary (user decision
        # 2026-06-17): the 8 product entity / type nouns (Studio / Project /
        # Collection / Space / Work / Canvas / Document / Timeline) are brand
        # vocabulary kept in English in every locale, even inside translated
        # sentences. This blanket guard scans the four non-English locale
        # catalogs' VALUES and hard-fails if any collision-free translated form
        # of Project / Collection / Work / Studio / Space survives —
        # future-proofing every new key. Collision forms (Canvas's form is also
        # the drawing surface, Timeline's the video track, Document's "a file",
        # Space's katakana/hangul form a Workspace substring) stay localized and
        # are enforced per-key by frozen-product-terms.test instead. See
        # scripts/lint-no-translated-product-noun.sh.
        run: pnpm lint:no-translated-product-noun

      - name: Lint dependency-cruiser (import-boundary rules)
        # Declarative import-boundary enforcement (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01) over all packages/*/src via
        # .dependency-cruiser.cjs forbidden rules:
        #   - routes-no-data-layer (#1): a server route must call a
        #     *.service, never a *.repo directly.
        #   - server-no-sync-aigc (#14, PROXY): only the 3 allowlisted SSE
        #     entry points may import the AI SDK.
        #   - library-no-app-import: @breatic/core|shared|domain must NOT
        #     import an application package (@server/@worker/@collab/@web).
        #   - collab-no-domain-import: collab must NOT import @breatic/domain.
        #   - service-no-hono (#2): a *.service.ts must NOT import hono.
        # The last three were migrated from hand-rolled bash grep guards —
        # dependency-cruiser sees only real imports (not comments), so it
        # can't false-positive on a doc-comment naming a banned alias.
        run: pnpm lint:dependency-cruiser

      - name: Lint no-raw-sql-outside-repo (core + server)
        # Enforce ADR 2026-05-31 "second-pass adjustment" second-layer CI guard: a table's SQL
        # lives in exactly one *.repo.ts home (one table, one repo home). Raw
        # sql`...` and Drizzle db.select/.insert/.update/.delete are
        # forbidden outside *.repo.ts in core + server (db.transaction
        # orchestration is allowed). This is what stops the auth-role
        # query — or any query — from scattering and drifting across
        # services again. See scripts/lint-no-raw-sql-outside-repo.sh.
        run: pnpm lint:no-raw-sql-outside-repo

      - name: Lint no-yjs-documents-sql-outside-repo (one shared table, one repo)
        # Enforce 2026-06-02 ADR "DB adapter unification": yjs_documents is
        # shared infra (collab persistence/auth/space-rpc + server project
        # create/delete/duplicate). no-raw-sql-outside-repo only proves SQL
        # sits in SOME *.repo.ts; it does NOT prove a SHARED table has a
        # SINGLE repo. This guard locks the table — by raw name or Drizzle
        # symbol — to its one home (core/db/yjs-documents.repo.ts) so it can
        # never scatter across services again. See
        # scripts/lint-no-yjs-documents-sql-outside-repo.sh.
        run: pnpm lint:no-yjs-documents-sql-outside-repo

      - name: Lint no-postgres-outside-core (one DB driver home)
        # Enforce 2026-06-02 ADR "DB adapter unification": the postgres.js
        # driver may be imported only in @breatic/core (the pool factory +
        # db/rawPg singletons + pingDb/checkPgReachable). Every other
        # package reaches Postgres through those core exports + the repos,
        # so the driver / its pool lifecycle / its `Sql` type never leak
        # across the package boundary (collab used to hand-roll its own
        # postgres.js pools). drizzle-orm/postgres-js (the Drizzle adapter)
        # is a different specifier and is allowed. See
        # scripts/lint-no-postgres-outside-core.sh.
        run: pnpm lint:no-postgres-outside-core

      - name: Lint no-ioredis-outside-core (one Redis driver home)
        # Enforce the 2026-06-02 Redis adapter unification plan: the ioredis driver may
        # be imported only in @breatic/core (the client factory +
        # get{Redis,QueueRedis,StreamRedis} singletons + pingRedis + the
        # re-exported Redis type). Every other package reaches Redis
        # through those core exports, so the driver / its Redis type never
        # leak across the package boundary (collab + domain used to import
        # ioredis directly). Redis is multi-connection by protocol so the
        # *connections* aren't collapsed — only the *driver package* is
        # locked to core. See scripts/lint-no-ioredis-outside-core.sh.
        run: pnpm lint:no-ioredis-outside-core

      - name: Lint no-missing-license-header (every src ts/tsx carries the SPDX header)
        # Enforce the file-header mandate (CLAUDE.md code style + ARCHITECTURE.md):
        # every first-party packages/*/src .ts/.tsx file must start with the
        # Copyright + SPDX-License-Identifier: LicenseRef-BOSL-1.0 header.
        # shadcn vendor (components/ui) is exempt - third-party IP.
        # See scripts/lint-no-missing-license-header.sh.
        run: pnpm lint:no-missing-license-header

      - name: Lint no-collab-auth-table-sql (collab routes auth through core)
        # Enforce ADR 2026-05-31 "second-pass adjustment" auth unification: collab must NOT
        # hand-roll the session / role lookups (raw project_members SQL
        # or a raw :session: redis key). Both moved to @breatic/core
        # (getSession + loadProjectRole) so auth is identical across
        # services; this guard locks collab out of re-introducing the
        # drift. See scripts/lint-no-collab-auth-table-sql.sh.
        run: pnpm lint:no-collab-auth-table-sql

      - name: Lint no-library-logger (core + shared + domain)
        # Enforce CLAUDE.md "server-side industrial-grade standards" mandate (commits
        # adf36d1 / 026c5aa / 201a839): @breatic/core, @breatic/shared
        # and @breatic/domain must NOT call logger.{info,warn,error,
        # debug,fatal,trace} or console.* (console output counts as
        # logging too). Library code throws or returns a sentinel;
        # the application layer (server route / collab hook / worker job
        # handler) owns audit logging. Hard-fails the PR on any library
        # logger/console call. See scripts/lint-no-library-logger.sh for
        # the exclusion list and rationale.
        run: pnpm lint:no-library-logger

      - name: Lint no-library-process-exit (core + shared + domain)
        # Enforce CLAUDE.md "process lifecycle, library layer forbidden" mandate:
        # @breatic/core, @breatic/shared and @breatic/domain must NOT
        # call process.exit(). A library throws a typed error
        # (InfraNotReadyError etc.); the application entry (server /
        # worker / collab) catches it, logs the context, and decides
        # whether to process.exit(1). See
        # scripts/lint-no-library-process-exit.sh for rationale.
        run: pnpm lint:no-library-process-exit

      - name: Lint service-logging (server + worker + collab entries)
        # Enforce CLAUDE.md "industrial-grade server standards": every
        # long-running service entry must wire a logger AND
        # startHealthServer. collab ran 15 days with dead file logging
        # (2026-06-01 to 06-16) because a transport died silently; this
        # stops a logger / health wire from being removed unnoticed. See
        # scripts/lint-service-logging.sh for rationale.
        run: pnpm lint:service-logging

      - name: Lint no-relative-import (all packages)
        # Enforce CLAUDE.md prohibition list (2026-05-29): non-test source must
        # import via a path alias, never a relative './' or '../' path.
        # Every package uses a globally-unique prefix (@shared / @core /
        # @domain / @collab / @worker / @server / @web); no bare @/.
        # Hard-fails the PR on any relative import in non-test source. See
        # scripts/lint-no-relative-import.sh for rationale + exclusions.
        run: pnpm lint:no-relative-import

      - name: Lint test-file-location (all test files under __tests__/)
        # Every *.test.ts(x) / *.spec.ts(x) lives in a __tests__/ directory,
        # never colocated next to its source (2026-07-15, user-ratified):
        # 93% of tests already did, and the unwritten+unguarded convention
        # let core/domain/server stragglers drift in. Doc alone recurs; this
        # guard is the enforcement half. Runs --self-test too, so a broken
        # checker fails CI. See scripts/lint-test-file-location.sh.
        run: pnpm lint:test-file-location

      - name: Lint no-cors-wildcard-credentials (security)
        # Enforce CLAUDE.md prohibition list #5 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): a CORS config must NOT pair
        # a wildcard origin ("*" / ["*"]) with credentials: true — that
        # would accept credentialed cross-origin requests from any origin.
        # Origins must be a specific whitelist (env ALLOWED_ORIGINS).
        # See scripts/lint-no-cors-wildcard-credentials.sh.
        run: pnpm lint:no-cors-wildcard-credentials

      - name: Lint no-hardcoded-secrets (security)
        # Enforce CLAUDE.md prohibition list #4 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): API keys, tokens, passwords
        # and credentialed connection strings must come from the
        # environment, never be committed inline in source. Detection is
        # secretlint + preset-recommend (27 battle-tested provider rules:
        # AWS / GCP / Stripe / GitHub / Slack / OpenAI / private keys / DB
        # connection strings / …) — provider token formats are low-FP.
        # Complements the .husky/pre-commit hook (which blocks secret
        # FILES); this catches inline secrets. The local-dev default DSN is
        # allowlisted with justification in .secretlintrc.json. Hard-fails
        # the PR. See scripts/lint-no-hardcoded-secrets.sh.
        run: pnpm lint:no-hardcoded-secrets

      - name: Lint no-sync-in-request-path (event loop)
        # Enforce CLAUDE.md prohibition list #10 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): synchronous fs/child_process
        # calls (readFileSync / execSync / …) block the event loop and are
        # forbidden in request-handling code — use the async form. This is
        # a path proxy: boot-time / first-use loaders (config/, infra/,
        # *-loader.ts, model-catalog/, fs-sandbox, worker providers/shared)
        # are allowlisted with justification in the script; prohibition
        # #10 still needs human review for hot-path sync I/O. See
        # scripts/lint-no-sync-in-request-path.sh.
        run: pnpm lint:no-sync-in-request-path

      - name: Lint schema-timestamps (deleted_at + created_at)
        # Enforce CLAUDE.md soft-delete + created_at mandates (CI maximal-
        # strictness guard suite, inner ADR 2026-06-01): every Drizzle
        # pgTable must carry created_at (no exemption) and deleted_at.
        # deleted_at has a small justified allowlist (payments +
        # credit_transactions are append-only financial ledgers;
        # credit_balances derives its soft-delete from users.deleted_at).
        # See scripts/lint-schema-timestamps.sh.
        run: pnpm lint:schema-timestamps

      - name: Lint no-drizzle-type-leak (repo boundary)
        # Enforce CLAUDE.md prohibition list #3 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): Drizzle's $inferSelect /
        # $inferInsert row-type helpers are allowed ONLY inside *.repo.ts
        # (mapped to a hand-written domain entity via toEntity). Exporting
        # them from the schema or using them in a service signature couples
        # business logic + the API response to the DB column layout. This
        # is a PROXY (catches explicit $infer tokens, not implicit Drizzle
        # types) — prohibition #3 still needs human review. See
        # scripts/lint-no-drizzle-type-leak.sh.
        run: pnpm lint:no-drizzle-type-leak

      - name: Lint no-param-as-string (all packages)
        # Enforce 2026-05-30 type-assertion governance: a Hono route
        # param `c.req.param(name)` already resolves to `string`, so
        # `... as string` is a redundant cast that lies about a possible
        # `undefined`. Use getProjectId(c) for the :pid behind
        # requireRole, or read the param directly. This grep gate is
        # belt-and-suspenders alongside the type-aware
        # no-unnecessary-type-assertion eslint rule (which also catches
        # it). Hard-fails the PR. See scripts/lint-no-param-as-string.sh.
        run: pnpm lint:no-param-as-string

      - name: Lint no-core-process-env (core + shared + domain)
        # Enforce CLAUDE.md env-injection mandate: @breatic/core,
        # @breatic/shared and @breatic/domain must NOT read process.env /
        # load .env — config ACQUISITION is an application decision. The
        # composition root (server / worker / collab entry) calls
        # initCore(process.env) once; library code reads injected config
        # via the env Proxy / getConfig() / getRawEnvVar(). Hard-fails the
        # PR on any process.env in library src. See
        # scripts/lint-no-core-process-env.sh.
        run: pnpm lint:no-core-process-env

      - name: Build packages (shared → core)
        run: pnpm turbo build --filter=@breatic/shared --filter=@breatic/core

      - name: Lint no-unresolved-alias-in-dist (after build)
        # Enforce that shipped dist/ carries no UNRESOLVED internal
        # path-alias (@shared / @core / @collab / @worker). A multi-entry
        # tsup build can code-split and leave cross-chunk `@shared/*`
        # specifiers externalized in the emitted dist — `pnpm build`
        # exits 0 even with the leak, so a green build is NOT proof the
        # dist is loadable (the web app crashes at runtime with
        # "Failed to resolve import"). Runs AFTER the build step above so
        # dist/ exists. Hard-fails the PR. See
        # scripts/lint-no-unresolved-alias-in-dist.sh.
        run: pnpm lint:no-unresolved-alias-in-dist

      - name: Typecheck (all packages)
        # tsc --noEmit across every workspace package (shared / core /
        # worker / collab / server / web). Previously filtered to just
        # server + collab, which silently left the other four packages
        # un-type-checked in CI (their tsup/vite builds transpile via
        # esbuild and do NOT type-check). web gained its typecheck script
        # in this change; backend packages already passed locally.
        run: pnpm turbo typecheck

      - name: Test (all packages)
        # Runs vitest across every workspace package (shared / core /
        # collab / worker / server / web). vitest configs already
        # exclude integration tests (`*.integration.test.ts`) which
        # require live Postgres / Redis; unit tests use mocks.
        run: pnpm turbo test
        env:
          SESSION_SECRET_KEY: ci-test-key
          DATABASE_URL: postgres://localhost/test
          REDIS_URL: redis://localhost/0
          REDIS_QUEUE_URL: redis://localhost/1
          REDIS_STREAM_URL: redis://localhost/2

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Independent job (no `needs`) so it runs in parallel with
    # lint-typecheck-test and keeps a separate infra-flaky signal; it is
    # deliberately NOT in docker's `needs`, so a slow container boot never
    # delays the image build. The `*.integration.test.ts` suites are excluded
    # from the unit `pnpm turbo test` run (they need a live PG + Redis), so
    # without this job the real-Postgres invariant tests (credit-deduction
    # atomicity, role-upgrade decide-once, etc.) never run on a PR.
    env:
      # The runner is ephemeral and global-setup.ts already calls .stop() on
      # the containers explicitly, so the Testcontainers Ryuk reaper adds no
      # value here and can be flaky in CI — disable it.
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `turbo run test:integration` builds shared → core → domain first (the
      # integration suites import all three; test:integration dependsOn build,
      # build dependsOn ^build → the whole chain). Testcontainers then spin
      # ephemeral Postgres + Redis on the Docker daemon ubuntu-latest ships
      # with — no `services:` block and no harness change needed. The harness
      # sets every required env var itself (container URLs + SESSION_SECRET_KEY
      # etc.), so this job needs no `env:` beyond the Ryuk toggle above.
      - name: Integration tests
        run: pnpm turbo run test:integration --filter=@breatic/server

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    # Builds both images (API-shared + web) and pushes to GHCR.
    # - PR:            build-only (no push) — smoke test that Dockerfiles still work
    # - push to main:  tags `:main` + `:latest`
    # - push to any other branch (e.g. test_thinkai_cc): tag = branch name
    # - push to v* tag: semver tags (`:1.2.3` + `:1.2`)
    #
    # docker/metadata-action@v5 generates all the tag permutations from the
    # triggering git ref — the rule table lives inline below so future edits
    # don't require reading metadata-action docs.
    #
    # Buildx + gha cache persists base-image layers across runs so we don't
    # re-pull `node:22-slim` every time and are resilient to Docker Hub 5xx.
    permissions:
      contents: read
      packages: write  # required to push images to GHCR

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags (breatic)
        id: meta-breatic
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/breatic
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push breatic (API/Worker/Collab/Migrate)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-breatic.outputs.tags }}
          labels: ${{ steps.meta-breatic.outputs.labels }}
          cache-from: type=gha,scope=breatic
          cache-to: type=gha,mode=max,scope=breatic

      - name: Compute tags (breatic-web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/breatic-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push breatic-web (nginx + SPA)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=breatic-web
          cache-to: type=gha,mode=max,scope=breatic-web
