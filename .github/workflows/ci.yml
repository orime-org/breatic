name: CI

on:
  push:
    branches: [main, test_thinkai_cc]
    tags: ['v*']
  pull_request:
    branches: [main]

# Action versions are tracked to major (e.g. @v6). These majors are all the
# Node.js 24 runtime releases — pinning below major would require manual
# bumps for every security patch. See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# for the Node 20 → 24 runner deprecation timeline that drove these bumps.

jobs:
  dev-proxy-guard:
    name: Dev Proxy Guard
    runs-on: ubuntu-latest

    # Defense in depth with .husky/pre-commit: block PRs/pushes where
    # packages/web/vite.config.ts routes /api, /uploads, or /ws to a
    # deployed host (thinkai.cc / breatic.ai). Those proxy targets must
    # stay on localhost so every developer's `pnpm dev` hits their own
    # API/Collab. See BUG-2 post-mortem for the regression that motivated
    # this check.
    steps:
      - uses: actions/checkout@v6

      - name: Check vite.config.ts proxy targets
        run: |
          offenders=$(grep -nE 'target:[[:space:]]*["'\''].*(thinkai\.cc|breatic\.ai)' \
            packages/web/vite.config.ts || true)
          if [ -n "$offenders" ]; then
            echo "::error file=packages/web/vite.config.ts::Dev proxy target must be localhost, not a deployed host"
            echo "Offending lines:"
            echo "$offenders"
            echo
            echo "Expected:"
            echo "  /api/     → http://localhost:3000"
            echo "  /uploads/ → http://localhost:3000"
            echo "  /ws       → ws://localhost:1234"
            exit 1
          fi
          echo "✅ vite.config.ts proxy targets are localhost-only"

  no-noaccount-residue:
    name: No NoAccount Mode Residue
    runs-on: ubuntu-latest

    # Defense against re-introduction of the deprecated NoAccount dev-bypass
    # auth mode (deleted in PR-a 2026-05-26). Scans backend code + scripts
    # + turbo.json for forbidden tokens (LOGIN_MODE / NoAccount /
    # dev-fixed-token / DEV_USER_ID). PR-b will extend the script's scan
    # range to packages/web/ + docs/ + .env.* templates once the frontend
    # bypass code is cleaned. See spec amend 2026-05-26 § 8.1 for the
    # invariant + scripts/check-no-noaccount.sh for scan logic.
    steps:
      - uses: actions/checkout@v6

      - name: Run check-no-noaccount.sh
        run: ./scripts/check-no-noaccount.sh

  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Install ffmpeg (worker video-handler tests)
        # Worker `src/__tests__/handlers/local/video-*.test.ts` spawn
        # ffmpeg for fixture generation + assertion. ubuntu-latest does
        # not bundle it, so install via apt-get explicitly. The ~30s
        # install is the cost of actually running the video-processing
        # unit tests in CI.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Lint hover patterns
        # Enforce inner ADR 2026-05-21-hover-pattern-standard: ban
        # `hover:bg-<token>/<2-digit>` Tailwind alpha-modifier hovers
        # in packages/web/src — solid token swap or `hover:opacity-90`
        # only. Fast grep; hard-fails the PR on violation.
        run: pnpm lint:hover

      - name: Lint no-CJK in production source + YAML config
        # Enforce inner DD 2026-05-22-breatic-i18n-migration-rev-3 +
        # CLAUDE.md prohibition list #13 "no CJK in YAML" (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): every user-facing string must
        # live in locales/*.json and route through the shared t() helper,
        # and code / comments / YAML config must be English. This grep
        # hard-fails the PR if any production .ts / .tsx / .css or any
        # config/workflow YAML (pnpm-lock excluded) carries hardcoded CJK
        # (tests + vendored shadcn primitives are exempted; see
        # scripts/lint-no-cjk.sh).
        run: pnpm lint:no-cjk

      - name: Lint no-trojan-source (CVE-2021-42574 security)
        # Enforce the source character-set SECURITY guard (CI maximal-
        # strictness guard suite, inner ADR 2026-06-01): block Trojan Source
        # attacks — bidirectional-override + invisible control characters
        # that make the code a human reviewer sees differ from what the
        # compiler parses (a hidden logic flip can pass review this way).
        # Detection is anti-trojan-source's public hasConfusablesInFiles API
        # (scripts/check-trojan-source.mjs), not its bin/ CLI (which crashes
        # on Node 24). This is the security half of the charset story; the
        # readability half (no CJK comments) is lint:no-cjk above. It only
        # flags the dangerous bidi / zero-width subset — ordinary non-ASCII
        # text (CJK, accents, typography, emoji) is NOT flagged. Hard-fails
        # the PR. See scripts/lint-no-trojan-source.sh.
        run: pnpm lint:no-trojan-source

      - name: Lint no-app-import-in-core (library can't import app)
        # Enforce ADR 2026-05-31 "backend convergence to a modular monolith" + root CLAUDE.md
        # three-layer boundary: @breatic/core, @breatic/shared and @breatic/domain must
        # NOT import any application package (@server / @worker / @collab /
        # @web). The dependency direction is app → domain → core/shared,
        # never the reverse. Machine enforcement of the modular-monolith
        # boundary. See scripts/lint-no-app-import-in-core.sh.
        run: pnpm lint:no-app-import-in-core

      - name: Lint no-domain-import-in-collab (collab can't import domain)
        # Enforce ADR 2026-05-31 "second-pass adjustment: extract @breatic/domain": collab
        # depends on core + shared ONLY; it must NOT import @breatic/domain
        # (the server+worker-only AIGC business — credit / task /
        # node-history / agent / model-catalog / canvas-lock). Directional
        # companion to no-app-import-in-core (which bans the reverse).
        # See scripts/lint-no-domain-import-in-collab.sh.
        run: pnpm lint:no-domain-import-in-collab

      - name: Lint dependency-cruiser (route↛repo + server↛AIGC)
        # Enforce CLAUDE.md prohibition #1 + #14 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01) via dependency-cruiser's
        # declarative forbidden rules over packages/server/src:
        #   - routes-no-data-layer (#1): a server route must call a
        #     *.service, never a *.repo directly.
        #   - server-no-sync-aigc (#14, PROXY): only the 3 allowlisted
        #     SSE entry points (agent chat / memory consolidation / text
        #     mini-tool) may import the AI SDK; any other server module
        #     doing so is a new synchronous AIGC surface — move it to the
        #     worker. See .dependency-cruiser.cjs.
        run: pnpm lint:dependency-cruiser

      - name: Lint no-raw-sql-outside-repo (core + server)
        # Enforce ADR 2026-05-31 "second-pass adjustment" second-layer CI guard: a table's SQL
        # lives in exactly one *.repo.ts home (one table, one repo home). Raw
        # sql`...` and Drizzle db.select/.insert/.update/.delete are
        # forbidden outside *.repo.ts in core + server (db.transaction
        # orchestration is allowed). This is what stops the auth-role
        # query — or any query — from scattering and drifting across
        # services again. See scripts/lint-no-raw-sql-outside-repo.sh.
        run: pnpm lint:no-raw-sql-outside-repo

      - name: Lint no-collab-auth-table-sql (collab routes auth through core)
        # Enforce ADR 2026-05-31 "second-pass adjustment" auth unification: collab must NOT
        # hand-roll the session / role lookups (raw project_members SQL
        # or a raw :session: redis key). Both moved to @breatic/core
        # (getSession + loadProjectRole) so auth is identical across
        # services; this guard locks collab out of re-introducing the
        # drift. See scripts/lint-no-collab-auth-table-sql.sh.
        run: pnpm lint:no-collab-auth-table-sql

      - name: Lint no-library-logger (core + shared only)
        # Enforce CLAUDE.md "server-side industrial-grade standards" mandate (commits
        # adf36d1 / 026c5aa / 201a839): @breatic/core and
        # @breatic/shared must NOT call logger.{info,warn,error,debug,
        # fatal,trace}. Library code throws or returns a sentinel; the
        # application layer (server route / collab hook / worker job
        # handler) owns audit logging. Hard-fails the PR on any
        # library logger call. See scripts/lint-no-library-logger.sh
        # for the exclusion list and rationale.
        run: pnpm lint:no-library-logger

      - name: Lint no-relative-import (all packages)
        # Enforce CLAUDE.md prohibition list (2026-05-29): non-test source must
        # import via a path alias, never a relative './' or '../' path.
        # Consumed packages use a globally-unique prefix (@shared / @core
        # / @collab / @worker); server / web use @/. Hard-fails the PR on
        # any relative import in non-test source. See
        # scripts/lint-no-relative-import.sh for rationale + exclusions.
        run: pnpm lint:no-relative-import

      - name: Lint no-service-import-hono (service layer stays protocol-agnostic)
        # Enforce CLAUDE.md prohibition list #2 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): a *.service.ts file must NOT
        # import hono / @hono/*. The route layer (route / handler / hook)
        # owns the transport; the domain service writes business logic and
        # throws a typed AppError. Hard-fails the PR on any hono import in
        # the service layer. See scripts/lint-no-service-import-hono.sh.
        run: pnpm lint:no-service-import-hono

      - name: Lint no-cors-wildcard-credentials (security)
        # Enforce CLAUDE.md prohibition list #5 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): a CORS config must NOT pair
        # a wildcard origin ("*" / ["*"]) with credentials: true — that
        # would accept credentialed cross-origin requests from any origin.
        # Origins must be a specific whitelist (env ALLOWED_ORIGINS).
        # See scripts/lint-no-cors-wildcard-credentials.sh.
        run: pnpm lint:no-cors-wildcard-credentials

      - name: Lint no-hardcoded-secrets (security)
        # Enforce CLAUDE.md prohibition list #4 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): API keys, tokens, passwords
        # and credentialed connection strings must come from the
        # environment, never be committed inline in source. Detection is
        # secretlint + preset-recommend (27 battle-tested provider rules:
        # AWS / GCP / Stripe / GitHub / Slack / OpenAI / private keys / DB
        # connection strings / …) — provider token formats are low-FP.
        # Complements the .husky/pre-commit hook (which blocks secret
        # FILES); this catches inline secrets. The local-dev default DSN is
        # allowlisted with justification in .secretlintrc.json. Hard-fails
        # the PR. See scripts/lint-no-hardcoded-secrets.sh.
        run: pnpm lint:no-hardcoded-secrets

      - name: Lint no-sync-in-request-path (event loop)
        # Enforce CLAUDE.md prohibition list #10 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): synchronous fs/child_process
        # calls (readFileSync / execSync / …) block the event loop and are
        # forbidden in request-handling code — use the async form. This is
        # a path proxy: boot-time / first-use loaders (config/, infra/,
        # *-loader.ts, model-catalog/, fs-sandbox, worker providers/shared)
        # are allowlisted with justification in the script; prohibition
        # #10 still needs human review for hot-path sync I/O. See
        # scripts/lint-no-sync-in-request-path.sh.
        run: pnpm lint:no-sync-in-request-path

      - name: Lint schema-timestamps (deleted_at + created_at)
        # Enforce CLAUDE.md soft-delete + created_at mandates (CI maximal-
        # strictness guard suite, inner ADR 2026-06-01): every Drizzle
        # pgTable must carry created_at (no exemption) and deleted_at.
        # deleted_at has a small justified allowlist (payments +
        # credit_transactions are append-only financial ledgers;
        # credit_balances derives its soft-delete from users.deleted_at).
        # See scripts/lint-schema-timestamps.sh.
        run: pnpm lint:schema-timestamps

      - name: Lint no-drizzle-type-leak (repo boundary)
        # Enforce CLAUDE.md prohibition list #3 (CI maximal-strictness
        # guard suite, inner ADR 2026-06-01): Drizzle's $inferSelect /
        # $inferInsert row-type helpers are allowed ONLY inside *.repo.ts
        # (mapped to a hand-written domain entity via toEntity). Exporting
        # them from the schema or using them in a service signature couples
        # business logic + the API response to the DB column layout. This
        # is a PROXY (catches explicit $infer tokens, not implicit Drizzle
        # types) — prohibition #3 still needs human review. See
        # scripts/lint-no-drizzle-type-leak.sh.
        run: pnpm lint:no-drizzle-type-leak

      - name: Lint no-param-as-string (all packages)
        # Enforce 2026-05-30 type-assertion governance: a Hono route
        # param `c.req.param(name)` already resolves to `string`, so
        # `... as string` is a redundant cast that lies about a possible
        # `undefined`. Use getProjectId(c) for the :pid behind
        # requireRole, or read the param directly. This grep gate is
        # belt-and-suspenders alongside the type-aware
        # no-unnecessary-type-assertion eslint rule (which also catches
        # it). Hard-fails the PR. See scripts/lint-no-param-as-string.sh.
        run: pnpm lint:no-param-as-string

      - name: Lint no-core-process-env (core + shared only)
        # Enforce CLAUDE.md env-injection mandate: @breatic/core and
        # @breatic/shared must NOT read process.env / load .env — config
        # ACQUISITION is an application decision. The composition root
        # (server / worker / collab entry) calls initCore(process.env)
        # once; library code reads injected config via the env Proxy /
        # getConfig() / getRawEnvVar(). Hard-fails the PR on any
        # process.env in library src. See
        # scripts/lint-no-core-process-env.sh.
        run: pnpm lint:no-core-process-env

      - name: Build packages (shared → core)
        run: pnpm turbo build --filter=@breatic/shared --filter=@breatic/core

      - name: Lint no-unresolved-alias-in-dist (after build)
        # Enforce that shipped dist/ carries no UNRESOLVED internal
        # path-alias (@shared / @core / @collab / @worker). A multi-entry
        # tsup build can code-split and leave cross-chunk `@shared/*`
        # specifiers externalized in the emitted dist — `pnpm build`
        # exits 0 even with the leak, so a green build is NOT proof the
        # dist is loadable (the web app crashes at runtime with
        # "Failed to resolve import"). Runs AFTER the build step above so
        # dist/ exists. Hard-fails the PR. See
        # scripts/lint-no-unresolved-alias-in-dist.sh.
        run: pnpm lint:no-unresolved-alias-in-dist

      - name: Typecheck (all packages)
        # tsc --noEmit across every workspace package (shared / core /
        # worker / collab / server / web). Previously filtered to just
        # server + collab, which silently left the other four packages
        # un-type-checked in CI (their tsup/vite builds transpile via
        # esbuild and do NOT type-check). web gained its typecheck script
        # in this change; backend packages already passed locally.
        run: pnpm turbo typecheck

      - name: Test (all packages)
        # Runs vitest across every workspace package (shared / core /
        # collab / worker / server / web). vitest configs already
        # exclude integration tests (`*.integration.test.ts`) which
        # require live Postgres / Redis; unit tests use mocks.
        run: pnpm turbo test
        env:
          SESSION_SECRET_KEY: ci-test-key
          DATABASE_URL: postgres://localhost/test
          REDIS_URL: redis://localhost/0
          REDIS_QUEUE_URL: redis://localhost/1
          REDIS_STREAM_URL: redis://localhost/2

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    # Builds both images (API-shared + web) and pushes to GHCR.
    # - PR:            build-only (no push) — smoke test that Dockerfiles still work
    # - push to main:  tags `:main` + `:latest`
    # - push to any other branch (e.g. test_thinkai_cc): tag = branch name
    # - push to v* tag: semver tags (`:1.2.3` + `:1.2`)
    #
    # docker/metadata-action@v5 generates all the tag permutations from the
    # triggering git ref — the rule table lives inline below so future edits
    # don't require reading metadata-action docs.
    #
    # Buildx + gha cache persists base-image layers across runs so we don't
    # re-pull `node:22-slim` every time and are resilient to Docker Hub 5xx.
    permissions:
      contents: read
      packages: write  # required to push images to GHCR

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags (breatic)
        id: meta-breatic
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/breatic
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push breatic (API/Worker/Collab/Migrate)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-breatic.outputs.tags }}
          labels: ${{ steps.meta-breatic.outputs.labels }}
          cache-from: type=gha,scope=breatic
          cache-to: type=gha,mode=max,scope=breatic

      - name: Compute tags (breatic-web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/breatic-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push breatic-web (nginx + SPA)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=breatic-web
          cache-to: type=gha,mode=max,scope=breatic-web
