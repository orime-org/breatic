name: CI

on:
  push:
    branches: [main, test_thinkai_cc]
    tags: ['v*']
  pull_request:
    branches: [main]

# Action versions are tracked to major (e.g. @v6). These majors are all the
# Node.js 24 runtime releases — pinning below major would require manual
# bumps for every security patch. See
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# for the Node 20 → 24 runner deprecation timeline that drove these bumps.

jobs:
  dev-proxy-guard:
    name: Dev Proxy Guard
    runs-on: ubuntu-latest

    # Defense in depth with .husky/pre-commit: block PRs/pushes where
    # packages/web/vite.config.ts routes /api, /uploads, or /ws to a
    # deployed host (thinkai.cc / breatic.ai). Those proxy targets must
    # stay on localhost so every developer's `pnpm dev` hits their own
    # API/Collab. See BUG-2 post-mortem for the regression that motivated
    # this check.
    steps:
      - uses: actions/checkout@v6

      - name: Check vite.config.ts proxy targets
        run: |
          offenders=$(grep -nE 'target:[[:space:]]*["'\''].*(thinkai\.cc|breatic\.ai)' \
            packages/web/vite.config.ts || true)
          if [ -n "$offenders" ]; then
            echo "::error file=packages/web/vite.config.ts::Dev proxy target must be localhost, not a deployed host"
            echo "Offending lines:"
            echo "$offenders"
            echo
            echo "Expected:"
            echo "  /api/     → http://localhost:3000"
            echo "  /uploads/ → http://localhost:3000"
            echo "  /ws       → ws://localhost:1234"
            exit 1
          fi
          echo "✅ vite.config.ts proxy targets are localhost-only"

  no-noaccount-residue:
    name: No NoAccount Mode Residue
    runs-on: ubuntu-latest

    # Defense against re-introduction of the deprecated NoAccount dev-bypass
    # auth mode (deleted in PR-a 2026-05-26). Scans backend code + scripts
    # + turbo.json for forbidden tokens (LOGIN_MODE / NoAccount /
    # dev-fixed-token / DEV_USER_ID). PR-b will extend the script's scan
    # range to packages/web/ + docs/ + .env.* templates once the frontend
    # bypass code is cleaned. See spec amend 2026-05-26 § 8.1 for the
    # invariant + scripts/check-no-noaccount.sh for scan logic.
    steps:
      - uses: actions/checkout@v6

      - name: Run check-no-noaccount.sh
        run: ./scripts/check-no-noaccount.sh

  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Install ffmpeg (worker video-handler tests)
        # Worker `src/__tests__/handlers/local/video-*.test.ts` spawn
        # ffmpeg for fixture generation + assertion. ubuntu-latest 不
        # 自带,显式 apt-get。30 秒安装代价换 CI 真跑视频处理 unit。
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Lint hover patterns
        # Enforce inner ADR 2026-05-21-hover-pattern-standard: ban
        # `hover:bg-<token>/<2-digit>` Tailwind alpha-modifier hovers
        # in packages/web/src — solid token swap or `hover:opacity-90`
        # only. Fast grep; hard-fails the PR on violation.
        run: pnpm lint:hover

      - name: Lint no-CJK in production source
        # Enforce inner DD 2026-05-22-breatic-i18n-migration-rev-3:
        # every user-facing string must live in locales/*.json and be
        # routed through the shared t() helper. This grep hard-fails the
        # PR if any production .ts / .tsx / .css carries hardcoded
        # CJK Unified Ideographs (tests + vendored shadcn primitives
        # are exempted; see scripts/lint-no-cjk.sh).
        run: pnpm lint:no-cjk

      - name: Build packages (shared → core)
        run: pnpm turbo build --filter=@breatic/shared --filter=@breatic/core

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@breatic/server --filter=@breatic/collab

      - name: Test (all packages)
        # Runs vitest across every workspace package (shared / core /
        # collab / worker / server / web). vitest configs already
        # exclude integration tests (`*.integration.test.ts`) which
        # require live Postgres / Redis; unit tests use mocks.
        run: pnpm turbo test
        env:
          SESSION_SECRET_KEY: ci-test-key
          DATABASE_URL: postgres://localhost/test
          REDIS_URL: redis://localhost/0
          REDIS_QUEUE_URL: redis://localhost/1
          REDIS_STREAM_URL: redis://localhost/2

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    # Builds both images (API-shared + web) and pushes to GHCR.
    # - PR:            build-only (no push) — smoke test that Dockerfiles still work
    # - push to main:  tags `:main` + `:latest`
    # - push to any other branch (e.g. test_thinkai_cc): tag = branch name
    # - push to v* tag: semver tags (`:1.2.3` + `:1.2`)
    #
    # docker/metadata-action@v5 generates all the tag permutations from the
    # triggering git ref — the rule table lives inline below so future edits
    # don't require reading metadata-action docs.
    #
    # Buildx + gha cache persists base-image layers across runs so we don't
    # re-pull `node:22-slim` every time and are resilient to Docker Hub 5xx.
    permissions:
      contents: read
      packages: write  # required to push images to GHCR

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags (breatic)
        id: meta-breatic
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/breatic
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push breatic (API/Worker/Collab/Migrate)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-breatic.outputs.tags }}
          labels: ${{ steps.meta-breatic.outputs.labels }}
          cache-from: type=gha,scope=breatic
          cache-to: type=gha,mode=max,scope=breatic

      - name: Compute tags (breatic-web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/breatic-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push breatic-web (nginx + SPA)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=breatic-web
          cache-to: type=gha,mode=max,scope=breatic-web
