name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (shared → core)
        run: pnpm turbo build --filter=@breatic/shared --filter=@breatic/core

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@breatic/server --filter=@breatic/collab

      - name: Test server (unit)
        run: cd packages/server && npx vitest run --exclude='**/db.test.ts' --exclude='**/redis.test.ts'
        env:
          SESSION_SECRET_KEY: ci-test-key
          DATABASE_URL: postgres://localhost/test
          REDIS_URL: redis://localhost/0
          REDIS_QUEUE_URL: redis://localhost/1
          REDIS_STREAM_URL: redis://localhost/2

      - name: Test shared (i18n)
        run: cd packages/shared && npx vitest run

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t breatic:ci .
