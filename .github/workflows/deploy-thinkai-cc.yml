name: Deploy to thinkai.cc

# Only triggers on pushes to test_thinkai_cc branch.
# This workflow file lives only on test_thinkai_cc — main never has it.

on:
  push:
    branches: [test_thinkai_cc]
  workflow_dispatch:

concurrency:
  group: deploy-thinkai-cc
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Diagnose network connectivity (temporary)
        run: |
          echo "=== Runner public IP ==="
          curl -s https://api.ipify.org || echo "ipify failed"
          echo ""
          echo "=== DNS resolve ==="
          getent hosts 47.83.161.93 || echo "(IP doesn't need DNS)"
          echo ""
          echo "=== TCP connect to 47.83.161.93:22 (10s timeout) ==="
          timeout 10 bash -c 'cat < /dev/tcp/47.83.161.93/22' && echo "SUCCESS" || echo "FAILED (timeout or refused)"
          echo ""
          echo "=== Control: connect to github.com:443 ==="
          timeout 10 bash -c 'cat < /dev/tcp/github.com/443' && echo "SUCCESS" || echo "FAILED"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.THINKAI_SSH_HOST }}
          port: ${{ secrets.THINKAI_SSH_PORT }}
          username: ${{ secrets.THINKAI_SSH_USER }}
          key: ${{ secrets.THINKAI_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: /opt/breatic/deploy.sh
