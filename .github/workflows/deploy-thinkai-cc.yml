name: Deploy to thinkai.cc

# Only triggers on pushes to test_thinkai_cc branch.
# This workflow file lives only on test_thinkai_cc — main never has it.

on:
  push:
    branches: [test_thinkai_cc]
  workflow_dispatch:

concurrency:
  group: deploy-thinkai-cc
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Diagnose network connectivity (temporary)
        run: |
          echo "=== Runner public IP ==="
          curl -s https://api.ipify.org || echo "ipify failed"
          echo ""
          echo "=== nc to 47.83.161.93:22 (5s) ==="
          nc -zv -w 5 47.83.161.93 22 2>&1 || echo "FAILED"
          echo ""
          echo "=== nc to github.com:443 (control) ==="
          nc -zv -w 5 github.com 443 2>&1 || echo "FAILED"
          echo ""
          echo "=== SSH banner grab (nc, 3s) ==="
          timeout 3 nc 47.83.161.93 22 2>&1 | head -3 || echo "No banner received"
          echo ""
          echo "=== traceroute (first 10 hops) ==="
          sudo apt-get install -qq -y traceroute >/dev/null 2>&1 || true
          traceroute -n -m 10 -w 2 47.83.161.93 2>&1 | head -15 || echo "traceroute unavailable"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.THINKAI_SSH_HOST }}
          port: ${{ secrets.THINKAI_SSH_PORT }}
          username: ${{ secrets.THINKAI_SSH_USER }}
          key: ${{ secrets.THINKAI_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: /opt/breatic/deploy.sh
